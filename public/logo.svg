<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timezio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233f"/>
      <stop offset="1" stop-color="#0a0f1d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.7">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>
  <rect x="3" y="3" width="506" height="506" rx="113" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- globe -->
  <g stroke="url(#ring)" stroke-width="13" fill="none" stroke-linecap="round">
    <circle cx="256" cy="256" r="150"/>
    <!-- meridians -->
    <ellipse cx="256" cy="256" rx="63" ry="150" stroke-opacity="0.85"/>
    <ellipse cx="256" cy="256" rx="125" ry="150" stroke-opacity="0.5" stroke-width="9"/>
    <!-- parallels -->
    <line x1="116" y1="256" x2="396" y2="256" stroke-opacity="0.85"/>
    <line x1="146" y1="190" x2="366" y2="190" stroke-opacity="0.45" stroke-width="9"/>
    <line x1="146" y1="322" x2="366" y2="322" stroke-opacity="0.45" stroke-width="9"/>
  </g>

  <!-- clock hands -->
  <g stroke="#f8fafc" stroke-linecap="round" fill="none">
    <line x1="256" y1="256" x2="256" y2="168" stroke-width="16"/>
    <line x1="256" y1="256" x2="318" y2="284" stroke-width="16"/>
  </g>
  <circle cx="256" cy="256" r="15" fill="#f8fafc"/>
  <circle cx="256" cy="256" r="6" fill="#2563eb"/>
</svg>
